<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Gubbu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffafbd);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
            flex-direction: column;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* মোবাইলের জন্য রেস্পন্সিভ মেইন টাইটেল */
        h1 {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem); /* স্ক্রিন অনুযায়ী সাইজ বদলাবে */
            color: #ffffff;
            text-shadow: 3px 3px 10px rgba(255, 50, 50, 0.6);
            z-index: 20;
            animation: floatUpDn 3s ease-in-out infinite;
            text-align: center;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        @keyframes floatUpDn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* প্রফেশনাল Serif ফন্ট (মোবাইলের জন্য অ্যাডজাস্ট করা) */
        .love-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            font-weight: 700;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(200, 0, 50, 0.6);
            z-index: 20;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 2s ease-out forwards;
            animation-delay: 1.5s;
            margin-bottom: 5px;
            padding: 0 15px;
        }

        /* হ্যান্ডরিটেন Cursive ফন্ট "S+S" */
        .initials-text {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 7vw, 2.8rem);
            color: #ffffff;
            text-shadow: 1px 1px 5px rgba(200, 0, 50, 0.4);
            z-index: 20;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1.5s ease-out forwards;
            animation-delay: 2.5s; 
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        /* নতুন: পেজের নিচে গোলাপের সারি */
        .roses-row {
            position: absolute;
            bottom: -15px; /* একটু নিচে নামানো যাতে ডাঁটি না দেখা যায় */
            left: 0;
            width: 100vw;
            display: flex;
            justify-content: space-evenly; /* সমান দূরত্বে থাকবে */
            align-items: flex-end;
            z-index: 25;
            pointer-events: none;
        }

        /* গোলাপগুলো বাতাসে দুলবে */
        .bottom-rose {
            width: clamp(50px, 15vw, 100px); /* মোবাইলে ছোট, পিসিতে বড় দেখাবে */
            height: auto;
            filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.3));
            transform-origin: bottom center; /* একদম নিচ থেকে দুলবে */
            animation: windSway 3s ease-in-out infinite alternate;
        }

        /* বাতাসে দোলার অ্যানিমেশন */
        @keyframes windSway {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        /* গোলাপের ভেতর থেকে "sorry" ওঠার স্টাইল */
        .sorry-comment {
            position: absolute;
            color: rgba(255, 255, 255, 0.95);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(255, 50, 50, 0.7); 
            pointer-events: none;
            z-index: 24; /* গোলাপের পেছনে */
            animation: floatUpSorry 4s ease-out forwards;
        }

        @keyframes floatUpSorry {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            15% { opacity: 1; transform: translateY(-40px) scale(1.1); }
            80% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-250px) scale(0.8); }
        }

    </style>
</head>
<body>

    <h1>Sorry Gubbu 🥺❤️</h1>
    <p class="love-text">i love you bou forever,and ever,and ever 💕</p>
    <p class="initials-text">S+S</p> 

    <div class="roses-row" id="rosesContainer"></div>

    <script>
        // পেজের নিচে ৭টা গোলাপ অ্যাড করা হচ্ছে (যাতে পুরো স্ক্রিন কভার হয়)
        const rosesContainer = document.getElementById('rosesContainer');
        const roseImageUrl = "https://img.sanishtech.com/u/a9e0002019be301de363d4a7da5b1b2f.png";
        const numberOfRoses = 7; 

        for (let i = 0; i < numberOfRoses; i++) {
            let img = document.createElement('img');
            img.src = roseImageUrl;
            img.className = 'bottom-rose';
            // এক একটা গোলাপ একটু আলাদা সময়ে দুলবে যাতে ন্যাচারাল লাগে
            img.style.animationDelay = (Math.random() * 2) + 's';
            img.style.animationDuration = (Math.random() * 1 + 2.5) + 's'; 
            rosesContainer.appendChild(img);
        }

        // ১. ফায়ারওয়ার্কস ব্লাস্ট
        function explodeHearts() {
            for (let i = 0; i < 60; i++) {
                let heart = document.createElement('div');
                heart.innerHTML = ['❤️', '💖', '💕'][Math.floor(Math.random() * 3)];
                heart.className = 'particle';
                document.body.appendChild(heart);
                
                let angle = Math.random() * Math.PI * 2; 
                let velocity = 10 + Math.random() * 15; 
                let x = window.innerWidth / 2;
                let y = window.innerHeight / 2;
                
                heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.transition = 'all 2.5s cubic-bezier(0.25, 1, 0.5, 1)';
                
                setTimeout(() => {
                    heart.style.transform = `translate(${Math.cos(angle) * velocity * 15}px, ${Math.sin(angle) * velocity * 15}px) scale(0) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 50);
                
                setTimeout(() => heart.remove(), 2600);
            }
        }

        // ২. ব্যাকগ্রাউন্ডে দুলতে দুলতে ওঠা হার্ট
        function floatHearts() {
            let heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '💕'][Math.floor(Math.random() * 3)];
            heart.style.position = 'absolute';
            heart.style.bottom = '-10%';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            heart.style.opacity = Math.random() * 0.4 + 0.2;
            heart.style.zIndex = '5';
            
            let duration = Math.random() * 3 + 4;
            heart.style.animation = `sway ${duration}s ease-in-out infinite alternate, moveUp ${duration + 2}s linear forwards`;
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), (duration + 2) * 1000);
        }

        // ৩. নিচের গোলাপগুলোর পেছন থেকে "sorry" ভেসে ওঠার ফাংশন
        function popUpSorryFromBottom() {
            let sorryText = document.createElement('div');
            sorryText.innerHTML = 'sorry 🥺'; 
            sorryText.className = 'sorry-comment';
            
            // র্যান্ডম X পজিশন (যাতে যেকোনো গোলাপের পেছন থেকে উঠতে পারে)
            let startX = Math.random() * (window.innerWidth - 50); 
            let startY = window.innerHeight - (Math.random() * 50 + 80); // গোলাপের ঠিক পেছন থেকে
            
            sorryText.style.left = startX + 'px';
            sorryText.style.top = startY + 'px';
            sorryText.style.fontSize = (Math.random() * 0.8 + 1) + 'rem';
            
            document.body.appendChild(sorryText);
            
            setTimeout(() => sorryText.remove(), 4000);
        }

        // ডায়নামিক CSS 
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes moveUp { to { bottom: 110%; } }
            @keyframes sway { 
                0% { transform: translateX(-20px) rotate(-10deg); } 
                100% { transform: translateX(20px) rotate(10deg); } 
            }
        `;
        document.head.appendChild(style);

        // ফাংশনগুলো কল করা
        setTimeout(explodeHearts, 500);
        setInterval(floatHearts, 400);

        // ৩.৫ সেকেন্ড পর (সব লেখা আসার পর) থেকে sorry বের হওয়া শুরু হবে
        setTimeout(() => {
            setInterval(popUpSorryFromBottom, 700);
        }, 3500); 
    </script>

</body>
</html>
